<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rica Premium Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* NAV */
nav {
    background: black;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 15px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px;
    background: white;
}

.btn {
    padding: 10px 15px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.product {
    background: white;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
}

/* CART */
.cart {
    background: white;
    margin: 20px;
    padding: 15px;
    border-radius: 10px;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #ddd;
}

.remove {
    color: red;
    cursor: pointer;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: black;
    color: white;
}

.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    color: white;
    padding: 12px;
    border-radius: 50px;
    text-decoration: none;
}
</style>
</head>

<body>

<nav>
    <div><b>RICA STORE</b></div>
    <div>Cart (<span id="cartCount">0</span>)</div>
</nav>

<div class="hero">
    <h1>Rica Premium Store</h1>
    <p>Modern Fashion Shop</p>
</div>

<h2 style="text-align:center;">Products</h2>

<div class="products">

    <div class="product">
        <h3>T-Shirt</h3>
        <p>KSh 500</p>
        <button class="btn" onclick="addToCart('T-Shirt', 500)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Hoodie</h3>
        <p>KSh 1200</p>
        <button class="btn" onclick="addToCart('Hoodie', 1200)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Sneakers</h3>
        <p>KSh 2500</p>
        <button class="btn" onclick="addToCart('Sneakers', 2500)">Add to Cart</button>
    </div>

</div>

<!-- CART SECTION -->
<div class="cart">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <h3>Total: KSh <span id="total">0</span></h3>
</div>

<footer>
    WhatsApp: 0727704197<br>
    © 2026 Rica Premium Store
</footer>

<a class="whatsapp" href="https://wa.me/254727704197">WhatsApp</a>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price) {
    cart.push({name, price});
    saveCart();
    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    saveCart();
    renderCart();
}

function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

function renderCart() {
    let cartItems = document.getElementById("cartItems");
    let total = 0;

    cartItems.innerHTML = "";

    cart.forEach((item, index) => {
        total += item.price;

        cartItems.innerHTML += `
            <div class="cart-item">
                <span>${item.name} - KSh ${item.price}</span>
                <span class="remove" onclick="removeItem(${index})">Remove</span>
            </div>
        `;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("cartCount").innerText = cart.length;
}

renderCart();
</script>

</body>
</html>
